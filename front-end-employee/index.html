<!DOCTYPE html>
<html ng-app="myEmployeeApp">

<head>
    <meta charset="UTF-8">
    <title>Employee Project</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">

    <script src="https://code.jquery.com/jquery-1.12.4.min.js"></script>

    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.6.10/angular.min.js"></script>

    <style>
        /* Your custom DHTML styles */
        .box-container {
            margin-top: 50px;
            text-align: center;
        }

        #animateBox {
            width: 100px;
            height: 100px;
            background: red;
            margin: 20px auto;
            display: none;
            /* Hidden by default for jQuery fadeIn */
        }
    </style>
</head>

<body ng-controller="MainContrllr">

    <!-- <nav class="navbar navbar-default">
        <div class="container-fluid">
            <div class="navbar-header">
                <a class="navbar-brand" href="#">Menu</a>
            </div>
        </div>
    </nav> -->
    <app-bar></app-bar>

    <div class="container box-container">
        <div class="jumbotron">
            <h1>{{ greeting }}</h1>
            <h2>{{ label }}</h2>
            <h3>{{ hint }}</h3>
            <p>{{description}}</p>

            <button class="btn btn-primary btn-lg" id="magicBtn">
                Run jQuery Animation
            </button>
        </div>

        <div id="animateBox"></div>
    </div>

    <script>
        // --- STEP 4: AngularJS Logic ---
        var app = angular.module('myEmployeeApp', []);

        app.controller('MainContrllr', function ($scope) {
            $scope.greeting = "Hello, Employee!";
            $scope.label = "Welcome to the Legacy Project";
            $scope.hint = "my hint is: This project is a mix of DHTML, jQuery, Bootstrap 3, and AngularJS 1.6";
            $scope.description = "Built with DHTML, jQuery, Bootstrap 3, and AngularJS 1.6";
        });

        // --- STEP 5: jQuery & DHTML Logic ---
        $(document).ready(function () {
            $('#magicBtn').click(function () {
                // Classic DHTML behavior: changing CSS and Visibility via jQuery
                $('#animateBox').toggle().animate({
                    width: "500px",
                    opacity: 0.25
                }, 1000).animate({
                    width: "1000px",
                    opacity: 0.5
                }, 500).animate({
                    width: "2000px",
                    opacity: 1.0
                }, 500);
            });
        });
    </script>
    <script src="appbar/appbar.js"></script>
</body>

</html>
